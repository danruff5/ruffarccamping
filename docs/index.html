<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camping Photo Gallery</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 2rem;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }
        h1 { margin: 0; font-weight: 800; letter-spacing: -0.025em; }
        main { flex: 1; padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover { transform: translateY(-4px); }
        .card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .card-content { padding: 1.5rem; }
        .card-title { font-size: 1.25rem; font-weight: 700; margin: 0 0 0.5rem 0; }
        .card-meta { font-size: 0.875rem; color: #94a3b8; }
        
        /* Modal Styles */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #modal img { max-width: 90%; max-height: 80%; border-radius: 8px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        #modal-info { margin-top: 1.5rem; text-align: center; max-width: 800px; padding: 0 2rem; }
        #modal-desc { font-size: 1.125rem; line-height: 1.6; margin-bottom: 1rem; }
        #modal-meta { color: var(--accent-color); font-weight: 600; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; }

        
    </style>
</head>
<body>
    <header>
        <h1><a href="index.html" style="color: inherit; text-decoration: none;">Camping Photo Gallery</a></h1>
    </header>
    <main>
        
<div class="grid">
    
    <a href="albums/no_rain_jubilee.html" class="card">
        <img src="assets/no_rain_jubilee/thumbnails/album_cover_cover.webp" alt="No Rain Jubilee">
        <div class="card-content">
            <h2 class="card-title">No Rain Jubilee</h2>
            <p class="card-meta">985 Photos</p>
        </div>
    </a>
    
    <a href="albums/flack_lake__24.html" class="card">
        <img src="assets/flack_lake__24/thumbnails/album_cover_cover.webp" alt="Flack Lake _24">
        <div class="card-content">
            <h2 class="card-title">Flack Lake _24</h2>
            <p class="card-meta">613 Photos</p>
        </div>
    </a>
    
    <a href="albums/rock_lake_may_24.html" class="card">
        <img src="assets/rock_lake_may_24/thumbnails/album_cover_cover.webp" alt="Rock Lake May 24">
        <div class="card-content">
            <h2 class="card-title">Rock Lake May 24</h2>
            <p class="card-meta">727 Photos</p>
        </div>
    </a>
    
    <a href="albums/provoking_8.html" class="card">
        <img src="assets/provoking_8/thumbnails/album_cover_cover.webp" alt="Provoking 8">
        <div class="card-content">
            <h2 class="card-title">Provoking 8</h2>
            <p class="card-meta">702 Photos</p>
        </div>
    </a>
    
    <a href="albums/rock_lake_2023.html" class="card">
        <img src="assets/rock_lake_2023/thumbnails/album_cover_cover.webp" alt="Rock Lake 2023">
        <div class="card-content">
            <h2 class="card-title">Rock Lake 2023</h2>
            <p class="card-meta">1562 Photos</p>
        </div>
    </a>
    
    <a href="albums/canoe_lake.html" class="card">
        <img src="assets/canoe_lake/thumbnails/album_cover_cover.webp" alt="Canoe Lake">
        <div class="card-content">
            <h2 class="card-title">Canoe Lake</h2>
            <p class="card-meta">149 Photos</p>
        </div>
    </a>
    
    <a href="albums/mccraney_lake.html" class="card">
        <img src="assets/mccraney_lake/thumbnails/album_cover_cover.webp" alt="McCraney Lake">
        <div class="card-content">
            <h2 class="card-title">McCraney Lake</h2>
            <p class="card-meta">379 Photos</p>
        </div>
    </a>
    
    <a href="albums/mississagi_camping.html" class="card">
        <img src="assets/mississagi_camping/thumbnails/album_cover_cover.webp" alt="Mississagi Camping">
        <div class="card-content">
            <h2 class="card-title">Mississagi Camping</h2>
            <p class="card-meta">128 Photos</p>
        </div>
    </a>
    
</div>

    </main>
    <div id="modal">
        <span class="close-btn">&times;</span>
        <img id="modal-img" src="" alt="Full Resolution">
        <div id="modal-info">
            <p id="modal-desc"></p>
            <p id="modal-meta"></p>
        </div>
    </div>
    <script>
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const modalDesc = document.getElementById('modal-desc');
        const modalMeta = document.getElementById('modal-meta');
        const closeBtn = document.querySelector('.close-btn');

        // Delegated click listener — reads data-* attributes, never evaluates inline JS.
        // This is immune to single/double quotes or any special characters in descriptions.
        document.addEventListener('click', (e) => {
            const item = e.target.closest('.photo-item');
            if (!item) return;
            modalImg.src = item.dataset.full;
            modalDesc.textContent = item.dataset.desc;
            modalMeta.textContent = `Rating: ${item.dataset.rating} | Score: ${item.dataset.score}/10`;
            modal.style.display = 'flex';
        });

        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; }
    </script>
</body>
</html>
