    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 2rem;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }
        h1 { margin: 0; font-weight: 800; letter-spacing: -0.025em; }
        main { flex: 1; padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover { transform: translateY(-4px); }
        .card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .card-content { padding: 1.5rem; }
        .card-title { font-size: 1.25rem; font-weight: 700; margin: 0 0 0.5rem 0; }
        .card-meta { font-size: 0.875rem; color: #94a3b8; }
        
        /* Modal Styles */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #modal img { max-width: 90%; max-height: 80%; border-radius: 8px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        #modal-info { margin-top: 1.5rem; text-align: center; max-width: 800px; padding: 0 2rem; }
        #modal-desc { font-size: 1.125rem; line-height: 1.6; margin-bottom: 1rem; }
        #modal-meta { color: var(--accent-color); font-weight: 600; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; }

        
.photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 1rem;
}
.photo-item {
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 1;
}
.photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
}
.photo-item:hover img {
    transform: scale(1.05);
}

    <div id="modal">
        <span class="close-btn">&times;</span>
        <img id="modal-img" src="" alt="Full Resolution">
        <div id="modal-info">
            <p id="modal-desc"></p>
            <p id="modal-meta"></p>
        </div>
    </div>
    <script>
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const modalDesc = document.getElementById('modal-desc');
        const modalMeta = document.getElementById('modal-meta');
        const closeBtn = document.querySelector('.close-btn');

        // Delegated click listener — reads data-* attributes, never evaluates inline JS.
        // This is immune to single/double quotes or any special characters in descriptions.
        document.addEventListener('click', (e) => {
            const item = e.target.closest('.photo-item');
            if (!item) return;
            modalImg.src = item.dataset.full;
            modalDesc.textContent = item.dataset.desc;
            modalMeta.textContent = `Rating: ${item.dataset.rating} | Score: ${item.dataset.score}/10`;
            modal.style.display = 'flex';
        });

        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; }
    </script>
